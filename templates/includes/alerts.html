{% if messages %}
{% for message in messages %}
<div class="alert alert-crm alert-dismissible fade show m-0 rounded-0 border-0
    {% if message.tags == 'error' %}alert-danger
    {% elif message.tags == 'warning' %}alert-warning
    {% elif message.tags == 'success' %}alert-success
    {% elif message.tags == 'info' %}alert-info
    {% else %}alert-info{% endif %}" role="alert">
    <div class="container-fluid px-4">
        {% if message.tags == 'success' %}<i class="bi bi-check-circle me-2"></i>
        {% elif message.tags == 'error' %}<i class="bi bi-exclamation-circle me-2"></i>
        {% elif message.tags == 'warning' %}<i class="bi bi-exclamation-triangle me-2"></i>
        {% else %}<i class="bi bi-info-circle me-2"></i>{% endif %}
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>
{% endfor %}
{% endif %}
