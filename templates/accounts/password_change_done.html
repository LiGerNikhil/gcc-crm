{% extends 'base.html' %}
{% load static %}

{% block title %}Password Changed - CRM System{% endblock %}

{% block auth_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center p-5">
                <i class="bi bi-check-circle-fill text-success display-1"></i>
                <h3 class="mt-3">Password Changed Successfully</h3>
                <p class="text-muted">Your password has been updated.</p>
                <a href="{% url 'accounts:dashboard' %}" class="btn btn-primary">Go to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
