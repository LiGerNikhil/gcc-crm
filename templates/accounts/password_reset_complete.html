{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete - CRM System{% endblock %}

{% block guest_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center p-5">
                <i class="bi bi-check-circle-fill text-success display-1"></i>
                <h3 class="mt-3">Password Reset Complete</h3>
                <p class="text-muted">Your password has been set successfully. You can now log in with your new password.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary">Sign In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
